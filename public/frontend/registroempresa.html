<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Negocio Afiliado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style> body { background-color: #f8f9fa; }
     .register-container { max-width: 900px;
      margin-top: 50px; margin-bottom: 50px;
       margin-left: auto; 
       margin-right: auto;
        padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); background-color: #ffffff; } 

        .form-section-title { border-bottom: 2px solid #7ab730;
             padding-bottom: 5px; margin-bottom: 25px; color: #7ab730;
             }

         .btn-submit { padding: 10px 30px; font-size: 1.1rem;
         }

          .login-hover:hover { color: #7ab730 !important; 
            text-decoration: underline;
             transition: color 0.3s;
             }
           </style>
</head>

<body>

<a href="index.html" class="btn btn-success">Regresar a Inicio</a>

<div class="container">
    <div class="register-container">
        
        <h2 class="text-center mb-4">✨ Registro de Puesto de Membresías</h2>
        <p class="text-center text-muted mb-5">Por favor, rellene todos los campos para verificar su negocio.</p>

        <!-- FORMULARIO SIN SCRIPTS INTERNOS -->
        <form id="formEmpresa" enctype="multipart/form-data">

            <h4 class="form-section-title">1. Datos del Negocio</h4>
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Nombre Comercial</label>
                    <input type="text" class="form-control" name="nombre_comercial" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="contrasena" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Razón Social</label>
                    <input type="text" class="form-control" name="razon_social" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">RFC</label>
                    <input type="text" class="form-control" name="rfc" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Categoría</label>
                    <select class="form-select" name="categoria" required>
                        <option disabled selected value="">Seleccione...</option>
                        <option>Fitness y Salud</option>
                        <option>Restaurantes y Comida</option>
                        <option>Belleza y Spa</option>
                        <option>Servicios Profesionales</option>
                        <option>Otros</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" name="descripcion" rows="2" maxlength="250" required></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email Público</label>
                    <input type="email" class="form-control" name="email_publico" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" name="telefono" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Logotipo</label>
                    <input type="file" class="form-control" name="logo" accept=".jpg, .png" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Página Web</label>
                    <input type="url" class="form-control" name="pagina_web">
                </div>
            </div>

            <hr class="my-5">

            <h4 class="form-section-title">2. Legal y Pagos</h4>
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Representante Legal</label>
                    <input type="text" class="form-control" name="nombre_representante" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Documento Legal (PDF)</label>
                    <input type="file" class="form-control" name="documento_legal" accept=".pdf" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Banco</label>
                    <input type="text" class="form-control" name="banco_nombre" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">CLABE</label>
                    <input type="text" class="form-control" name="cuenta_clabe" required>
                </div>
            </div>

            <hr class="my-5">

            <h4 class="form-section-title">3. Membresía</h4>
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Nombre de Membresía</label>
                    <input type="text" class="form-control" name="nombre_membresia" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" name="precio_membresia" required>
                </div>

                <div class="col-12">
                    <label class="form-label">Beneficios</label>
                    <textarea class="form-control" name="beneficios" rows="3"></textarea>
                </div>

                <div class="col-12 mt-2">
                    <input type="checkbox" class="form-check-input" required>
                    <label>Acepto los términos</label>
                </div>
            </div>

            <div class="d-grid gap-2 col-md-6 mx-auto mt-5">
                <button type="submit" class="btn btn-success btn-submit">¡Publicar mi Puesto Ahora!</button>
            </div>

        </form>

    </div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- TU SCRIPT (ÚNICO) -->
<script src="js/registroempresa.js"></script>

</body>
</html>
