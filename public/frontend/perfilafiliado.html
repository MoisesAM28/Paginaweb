<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil de Afiliado</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4f6dff, #7fa1ff);
  margin: 0;
  padding: 0;
}

.card {
  max-width: 420px;
  margin: 60px auto;
  background: white;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

.logo {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #4f6dff;
  margin-bottom: 15px;
}

h2 {
  margin: 10px 0 5px;
}

.categoria {
  color: #777;
  font-size: 14px;
  margin-bottom: 15px;
}

.info {
  text-align: left;
  font-size: 15px;
}

.info p {
  margin: 8px 0;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  background: #4f6dff;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

.btn:hover {
  background: #3b55d8;
}
</style>

</head>
<body>

<!-- 🔴 ESTE ID ES CLAVE -->
<div class="card" id="profileData">
  Cargando perfil...
</div>

<!-- JS al final del body (correcto) -->
<script src="js/perfilafiliado.js"></script>

</body>
</html>
